<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Shield - Phishing Email Detector</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:10px;
}

p{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:220px;
    padding:15px;
    border:none;
    border-radius:10px;
    resize:none;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0284c7;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}
</style>

</head>
<body>

<div class="container">

<h1>🛡 Cyber Shield</h1>

<p>AI Powered Phishing Email Detection System</p>

<form method="POST">
<textarea name="email"
placeholder="Paste email content here..."></textarea>

<button type="submit">
🔍 Analyze Email
</button>
</form>

<div class="result">
{{ result }}
</div>

<div class="footer">
Developed by Chinmaya Sahoo
</div>

</div>

</body>
</html>
