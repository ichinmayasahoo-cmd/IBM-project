<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Shield Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.login-box{
    width:400px;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h1{
    color:#38bdf8;
    margin-bottom:10px;
}

p{
    color:#cbd5e1;
}

input{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0284c7;
}
</style>
</head>

<body>

<div class="login-box">
<h1>🛡 Cyber Shield</h1>
<p>Secure OTP Authentication</p>

<form method="POST">
<input type="email" name="email" placeholder="Enter your Email" required>

<button type="submit">
Send OTP
</button>
</form>

</div>

</body>
</html>
