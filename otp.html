<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OTP Verification</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:400px;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h1{
    color:#38bdf8;
}

input{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    text-align:center;
    font-size:20px;
    letter-spacing:5px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>🔐 OTP Verification</h1>

<form method="POST">
<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">
Verify OTP
</button>
</form>

</div>

</body>
</html>
